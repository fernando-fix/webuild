        function setupAutoSave() {
            const canvas = document.getElementById('canvas');
            const observer = new MutationObserver(() => {
                if (currentTab === 'edit') autoSaveDebounced();
            });
            observer.observe(canvas, { childList: true, subtree: true, attributes: true, characterData: true });
        }

        /* ================================================================
           PROJETOS (CRUD)
           ================================================================ */
        function getProjects() {
            return JSON.parse(localStorage.getItem('web_builder_projects')) || {};
        }

        function saveProjects(projects) {
            localStorage.setItem('web_builder_projects', JSON.stringify(projects));
        }

        function saveProject() {
            const canvasHTML = document.getElementById('canvas').innerHTML;
            const active = localStorage.getItem('web_builder_active_project') || 'untitled';
            const projects = getProjects();
            const existing = projects[active];
            const name = prompt('Nome do projeto:', existing ? existing.name : 'Meu Projeto');
            if (!name) return;

            projects[active] = {
                id: active,
                name: name,
                html: canvasHTML,
                date: new Date().toISOString()
            };
            saveProjects(projects);
            renderProjectsList();
            alert(`"${name}" salvo com sucesso!`);
        }

        function loadProject(id) {
            const projects = getProjects();
            if (!projects[id]) return;
            saveState();
            localStorage.setItem('web_builder_active_project', id);
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = projects[id].html;
            canvas.querySelectorAll('.editable-element').forEach(el => bindElementEvents(el));
            canvas.querySelectorAll('.c-container').forEach(c => {
                if (!c.classList.contains('editable-element')) c.classList.add('editable-element');
                bindElementEvents(c);
            });
            clearSelection();
            saveState();
            renderProjectsList();
            switchTab('edit');
        }

        function newProject() {
            if (selectedElement) saveState();
            const projects = getProjects();
            const id = 'proj_' + Date.now();
            projects[id] = { id: id, name: 'Novo Projeto', html: '', date: new Date().toISOString() };
            saveProjects(projects);
            localStorage.setItem('web_builder_active_project', id);
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            clearSelection();
            saveState();
            renderProjectsList();
            switchTab('edit');
        }

        function deleteProject(id, e) {
            e.stopPropagation();
            if (!confirm('Tem certeza que deseja excluir este projeto?')) return;
            const projects = getProjects();
            delete projects[id];
            saveProjects(projects);
            if (localStorage.getItem('web_builder_active_project') === id) {
                const newId = 'proj_' + Date.now();
                projects[newId] = { id: newId, name: 'Novo Projeto', html: '', date: new Date().toISOString() };
                saveProjects(projects);
                localStorage.setItem('web_builder_active_project', newId);
                const canvas = document.getElementById('canvas');
                canvas.innerHTML = '';
                clearSelection();
                saveState();
            }
            renderProjectsList();
        }

        function renderProjectsList() {
            const container = document.getElementById('projects-list');
            if (!container) return;
            container.innerHTML = '';
            const projects = getProjects();
            const activeId = localStorage.getItem('web_builder_active_project') || 'untitled';
            const keys = Object.keys(projects);

            if (keys.length === 0) {
                container.innerHTML = '<p style="color:#666;font-size:12px;text-align:center;padding:10px;">Nenhum projeto salvo.</p>';
                return;
            }

            keys.forEach(id => {
                const p = projects[id];
                const item = document.createElement('div');
                item.className = 'project-item' + (id === activeId ? ' active' : '');
                item.onclick = () => loadProject(id);
                const dateStr = new Date(p.date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: '2-digit' });
                item.innerHTML = `
                    <span class="project-icon">📄</span>
                    <div class="project-info">
                        <div class="project-name">${escapeHTML(p.name)}</div>
                        <div class="project-date">${dateStr}</div>
                    </div>
                    <button class="btn-delete-project" title="Excluir">✕</button>
                `;
                item.querySelector('.btn-delete-project').onclick = (ev) => deleteProject(id, ev);
                container.appendChild(item);
            });
        }

        /* ================================================================
           EXPORT / IMPORT
           ================================================================ */
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.download = filename;
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function exportProject() {
            const active = localStorage.getItem('web_builder_active_project') || 'untitled';
            const projects = getProjects();
            const project = projects[active];
            if (!project) { alert('Nenhum projeto para exportar.'); return; }
            downloadJSON(project, project.name.replace(/[^a-z0-9]/gi, '_') + '.json');
        }

        function importProject() {
            document.getElementById('import-project-input').click();
        }

        function exportLibrary() {
            const lib = JSON.parse(localStorage.getItem('web_builder_library')) || [];
            downloadJSON(lib, 'biblioteca.json');
        }

        function importLibrary() {
            document.getElementById('import-library-input').click();
        }

        /* ================================================================
           INICIALIZAÇÃO
           ================================================================ */
        document.getElementById('import-project-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    const projects = getProjects();
                    const id = 'proj_' + Date.now();
                    data.id = id;
                    projects[id] = data;
                    saveProjects(projects);
                    renderProjectsList();
                    alert(`Projeto "${data.name}" importado!`);
                } catch (err) {
                    alert('Arquivo JSON inválido.');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        document.getElementById('import-library-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    const current = JSON.parse(localStorage.getItem('web_builder_library')) || [];
                    const existingIds = new Set(current.map(i => i.id));
                    let added = 0;
                    imported.forEach(item => {
                        if (!existingIds.has(item.id)) {
                            current.push(item);
                            added++;
                        }
                    });
                    localStorage.setItem('web_builder_library', JSON.stringify(current));
                    renderComponentMenu();
                    renderLibrary();
                    alert(`${added} componente(s) importado(s)!`);
                } catch (err) {
                    alert('Arquivo JSON inválido.');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        /* ================================================================
           BIND DRAG + SAVE STATE NOS COMPONENTES EXISTENTES
           ================================================================ */
        const origBindElementEvents = bindElementEvents;

        bindElementEvents = function(element) {
            if (element._wb_bound) return;
            element._wb_bound = true;
            origBindElementEvents(element);
            setupDragDrop(element);
        };

        /* ================================================================
           RESTAURAR RASCUNHO + SETUP
           ================================================================ */
        document.addEventListener("DOMContentLoaded", function () {
            renderComponentMenu();
            // Restaurar rascunho salvo
            try {
                const activeId = localStorage.getItem('web_builder_active_project') || 'untitled';
                const projects = getProjects();
                if (projects[activeId] && projects[activeId].html) {
                    const canvas = document.getElementById('canvas');
                    canvas.innerHTML = projects[activeId].html;
                    canvas.querySelectorAll('.editable-element').forEach(el => { assignWbId(el); bindElementEvents(el); });
                    canvas.querySelectorAll('.c-container').forEach(c => {
                        if (!c.classList.contains('editable-element')) c.classList.add('editable-element');
                        assignWbId(c);
                        bindElementEvents(c);
                    });
                    // Recalc max id
                    canvas.querySelectorAll('[data-wb-id]').forEach(el => {
                        const id = parseInt(el.getAttribute('data-wb-id'));
                        if (id > wbIdCounter) wbIdCounter = id;
                    });
                }
            } catch(e) { console.warn('Erro ao restaurar rascunho:', e); }
            saveState();
            setupAutoSave();
            syncCustomCSS();
            renderProjectsList();
            renderViewportPresets();
        });
    </script>
</body>

</html>
